worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;
        include /etc/nginx/mime.types;

        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        # ── Mentible-lite demo (static SPA) ────────────────────────────────
        # Served from the Astro build at /demos/mentible/ (files land in
        # public/demos/mentible/ → dist/demos/mentible/). See
        # docs/DEMO_mentible_lite.md.
        #
        # Static, content-hashed export assets (JS bundles under _expo/ and the
        # fonts/images/book data under assets/) MUST resolve to a real file or
        # return a real 404 — they must NOT fall back to index.html. Serving
        # HTML in place of a missing .js/.ttf is what poisoned the CDN cache
        # (Cloudflare cached the SPA shell under font URLs) and hung the app on
        # a blank splash. Filenames are content-hashed, so cache them forever.
        location ^~ /demos/mentible/_expo/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
        location ^~ /demos/mentible/assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Only genuine SPA deep links (e.g. /library) fall back to the app's own
        # index.html. Keep that HTML uncached so a new deploy is picked up at
        # once and never pins a stale shell.
        location /demos/mentible/ {
            try_files $uri $uri/ /demos/mentible/index.html;
            add_header Cache-Control "no-cache" always;
        }

        location / {
            try_files $uri $uri/index.html =404;
        }

        # ── Prometheus scrape target for nginx-prometheus-exporter ──────────
        # Bound to the container's localhost only so it isn't reachable from
        # outside the compose network. The exporter sidecar (running in the
        # same network) hits this and translates to /metrics on its own port.
        location = /stub_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;   # Docker compose default bridge networks
            allow 192.168.0.0/16;  # Docker compose user networks
            deny all;
        }
    }
}