# =============================================================================
# infra/monitoring/docker-compose.monitoring.yml
#
# Third-tenant monitoring stack on the shared Hetzner CX22.
#
# What it runs:
#   - Prometheus: scrapes targets locally + remote_write to Grafana Cloud free tier
#   - Promtail: tails docker / nginx / journald / backup logs → Grafana Cloud Loki
#   - nginx-prometheus-exporter: turns mambakkam's stub_status into /metrics
#   - blackbox-exporter: synthetic uptime probes for both public hostnames
#   - node-exporter: host CPU/RAM/disk/network for the CX22
#
# What it does NOT run:
#   - Grafana — dashboards live on Grafana Cloud (*.grafana.net), so no local UI
#   - Alertmanager — Grafana Cloud handles alerting on the same metrics
#   - Loki — Grafana Cloud Loki is the log store; Promtail just ships to it
#
# Topology:
#
#   ┌─ Hetzner CX22 ─────────────────────────────────────────────┐
#   │                                                              │
#   │   mambakkam (astrowind container)                            │
#   │       └─ /stub_status (loopback-only inside compose net)     │
#   │              ▲                                               │
#   │              │ scrape                                        │
#   │   ┌──────────┴──────────────────────────────────┐            │
#   │   │  monitoring stack                           │            │
#   │   │                                              │            │
#   │   │  ┌───────────────────────┐                  │            │
#   │   │  │ nginx-prom-exporter   │                  │            │
#   │   │  │ :9113                 │                  │            │
#   │   │  └───────────────────────┘                  │            │
#   │   │  ┌───────────────────────┐                  │            │
#   │   │  │ blackbox-exporter     │                  │            │
#   │   │  │ :9115                 │                  │            │
#   │   │  └───────────────────────┘                  │            │
#   │   │  ┌───────────────────────┐                  │            │
#   │   │  │ node-exporter         │                  │            │
#   │   │  │ :9100 (host net)      │                  │            │
#   │   │  └───────────────────────┘                  │            │
#   │   │  ┌───────────────────────┐                  │            │
#   │   │  │ Prometheus :9090      │──── remote_write ─┼─▶ Grafana Cloud
#   │   │  │ (loopback bind only)  │                  │   (*.grafana.net)
#   │   │  └───────────────────────┘                  │            │
#   │   └──────────────────────────────────────────────┘            │
#   │                                                              │
#   └──────────────────────────────────────────────────────────────┘
#
# Run:
#   cd /opt/mambakkam/infra/monitoring
#   docker compose --env-file .env.monitoring up -d
#
# .env.monitoring needs Grafana Cloud creds (see .env.monitoring.example).
# =============================================================================

services:

  # ── Prometheus: scrape + remote_write ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    restart: always
    user: "65534:65534"   # nobody:nobody — Prometheus runs unprivileged
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      # Local TSDB is small — we ship to Grafana Cloud for long-term storage.
      # 7d retention is plenty for ad-hoc local PromQL via the UI.
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=2GB
      - --web.enable-lifecycle           # POST /-/reload for config hot-reload
      - --web.listen-address=0.0.0.0:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    environment:
      # Read by prometheus.yml's $... substitution at start-up. The values
      # come from .env.monitoring on the host.
      GRAFANA_CLOUD_REMOTE_WRITE_URL: ${GRAFANA_CLOUD_REMOTE_WRITE_URL}
      GRAFANA_CLOUD_USERNAME: ${GRAFANA_CLOUD_USERNAME}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
      STUDYBUDDY_METRICS_TOKEN: ${STUDYBUDDY_METRICS_TOKEN}
    ports:
      # Loopback only — never publish 0.0.0.0:9090. The host nginx vhost
      # gates external access via Cloudflare Access if you choose to expose
      # the Prometheus UI publicly. Default is no public exposure.
      - "127.0.0.1:9090:9090"
    # Required on Linux Docker so `host.docker.internal` resolves to the host
    # gateway from inside the container (matches macOS/Windows default).
    # The scrape jobs for cx22-host node-exporter and the StudyBuddy compose-
    # internal nginx (127.0.0.1:8443 from the host's perspective) both need this.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Promtail: ships logs to Grafana Cloud Loki ─────────────────────────────
  # Counterpart to Prometheus's remote_write — agent-mode log shipper.
  # See promtail.yml for the 4 scrape sources (docker, nginx, journal, backups).
  promtail:
    image: grafana/promtail:3.2.1
    container_name: monitoring-promtail
    restart: always
    # NOTE: runs as root because Promtail needs to read:
    #   - /var/run/docker.sock                 (docker_sd discovery)
    #   - /var/lib/docker/containers/*/json.log (raw container log files)
    #   - /var/log/journal                     (systemd binary journal)
    # Docker socket access is the privileged operation; everything else is RO.
    user: root
    command:
      - --config.file=/etc/promtail/promtail.yml
      - --config.expand-env=true
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml:ro
      - promtail_positions:/tmp                    # state: where we are in each file
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro                       # nginx + backup script logs
      - /var/log/journal:/var/log/journal:ro       # systemd journal binary files
      - /etc/machine-id:/etc/machine-id:ro         # journal namespacing key
    environment:
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL}
      GRAFANA_CLOUD_LOKI_USERNAME: ${GRAFANA_CLOUD_LOKI_USERNAME}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
    ports:
      # Loopback only — Promtail's HTTP server is for /metrics + /ready, not
      # the log push surface (that's Grafana Cloud).
      - "127.0.0.1:9080:9080"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── nginx-prometheus-exporter: scrapes mambakkam astrowind stub_status ─────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    container_name: monitoring-nginx-exporter
    restart: always
    command:
      # The astrowind container is on the mambakkam compose network. We
      # connect to it by container name. See "networks:" at the bottom.
      - --nginx.scrape-uri=http://mambakkam-astrowind:8080/stub_status
    networks:
      - default              # for prometheus to reach it
      - mambakkam_default    # for it to reach the astrowind container
    ports:
      - "127.0.0.1:9113:9113"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M

  # ── blackbox-exporter: synthetic uptime probes ─────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: monitoring-blackbox-exporter
    restart: always
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "127.0.0.1:9115:9115"
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M

  # ── node-exporter: CX22 host CPU/RAM/disk/network ──────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: monitoring-node-exporter
    restart: always
    network_mode: host       # node-exporter MUST run on the host net to see
                             # accurate netdev / fs metrics
    pid: host
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M

volumes:
  prometheus_data:
  promtail_positions:

networks:
  # Allow nginx-exporter to reach the mambakkam astrowind container by name.
  # The actual network is created by the mambakkam compose stack; we attach.
  mambakkam_default:
    external: true
