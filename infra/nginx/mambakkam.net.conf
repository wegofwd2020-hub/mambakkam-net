# =============================================================================
# mambakkam.net — host-level nginx vhost (Cloudflare Origin Cert)
#
# Lives at /etc/nginx/sites-available/mambakkam.net.conf, symlinked from
# sites-enabled/. Installed by scripts/launch/provision.sh; reloaded
# manually by the operator after edits (NOT auto-deployed — a syntax error
# would take down the co-tenant StudyBuddy stack too).
#
# Architecture:
#   Internet → Cloudflare (TLS, DDoS, cache) → :443 here → 127.0.0.1:8081
#                                                          │
#                                                          └─ astrowind container
#                                                             (docker-compose.demo.yml)
#
# SSL is via a Cloudflare Origin Certificate that covers BOTH mambakkam.net
# and demo.usestudybuddy.com — a single cert at /etc/ssl/cloudflare/origin-*.pem
# is shared between this vhost and the StudyBuddy stack's internal nginx.
# Cloudflare → SSL/TLS mode "Full (strict)" requires a valid origin cert.
# =============================================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name mambakkam.net www.mambakkam.net;

    # Cloudflare's "Always Use HTTPS" handles this at the edge, but we redirect
    # at the origin too in case anyone hits the VPS IP directly.
    return 301 https://mambakkam.net$request_uri;
}

# ── www → apex redirect ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.mambakkam.net;

    ssl_certificate     /etc/ssl/cloudflare/origin-cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    return 301 https://mambakkam.net$request_uri;
}

# ── apex — main site ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mambakkam.net;

    ssl_certificate     /etc/ssl/cloudflare/origin-cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin-key.pem;

    # Modern TLS only (Cloudflare Origin Cert supports these out of the box)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mambakkam.net.access.log;
    error_log  /var/log/nginx/mambakkam.net.error.log;

    # ── Security headers ──────────────────────────────────────────────────
    # HSTS: tell browsers (and Cloudflare) to require HTTPS for 1 year.
    # Only safe to ship after the cert chain is verified working end-to-end.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Body / proxy limits ───────────────────────────────────────────────
    client_max_body_size 5m;

    # ── Long-cache fingerprinted Astro assets ─────────────────────────────
    # Astro emits files like /_astro/abc123.js with content-hashed names.
    # Safe to cache for a year because filename changes on every rebuild.
    location ~ ^/_astro/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Override Cache-Control upstream may emit; long cache is correct here.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Default location — proxy to the astrowind container ───────────────
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # ── /mentible-api/ — Mentible demo backend (same-origin path) ─────────
    # The Mentible-lite demo frontend is static at /demos/mentible/ (served by
    # the astrowind container). Its API calls go to this same-origin path so
    # there's no new subdomain, DNS record, or Origin Cert SAN to manage — and
    # no CORS. The trailing slash on proxy_pass strips the /mentible-api/
    # prefix, so /mentible-api/api/v1/generate → the container's /api/v1/generate.
    # Backend runs as a sibling compose stack (StudyBuddy_SelfLearner/
    # docker-compose.demo.yml) bound to 127.0.0.1:8092. See the runbook at
    # mambakkam-net/docs/DEMO_mentible_lite.md.
    location /mentible-api/ {
        proxy_pass http://127.0.0.1:8092/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Generation jobs are async (submit + poll), but POST /export is
        # synchronous and renders for minutes when diagrams=true.
        proxy_read_timeout 300s;
        # Book payloads (POST /structure, /export) exceed the apex 5m default.
        client_max_body_size 25m;
    }

    # ── /metrics — gated by Cloudflare Access ────────────────────────────
    # Cloudflare Access sits in front of this URL and signs every request
    # with a JWT in the `Cf-Access-Jwt-Assertion` header. We don't validate
    # the JWT here (Cloudflare guarantees that any traffic reaching the
    # origin on this path passed Access), but we do refuse direct VPS-IP
    # hits by requiring requests come through Cloudflare's IP ranges.
    #
    # Cloudflare publishes its IP list at https://www.cloudflare.com/ips/.
    # The list below is the v4 set as of 2026-05; revisit if Cloudflare
    # rotates ranges. v6 ranges TBD when the operator enables IPv6.
    location = /metrics {
        # Cloudflare IP allowlist (v4) — drop everything else.
        allow 173.245.48.0/20;
        allow 103.21.244.0/22;
        allow 103.22.200.0/22;
        allow 103.31.4.0/22;
        allow 141.101.64.0/18;
        allow 108.162.192.0/18;
        allow 190.93.240.0/20;
        allow 188.114.96.0/20;
        allow 197.234.240.0/22;
        allow 198.41.128.0/17;
        allow 162.158.0.0/15;
        allow 104.16.0.0/13;
        allow 104.24.0.0/14;
        allow 172.64.0.0/13;
        allow 131.0.72.0/22;
        deny  all;

        # Belt-and-braces: refuse if Cloudflare didn't stamp the Access JWT.
        # If the header is empty, Access wasn't enforced — bail.
        if ($http_cf_access_jwt_assertion = "") {
            return 403;
        }

        # The astrowind container exposes /stub_status on its internal port,
        # but Prometheus already scrapes that via the exporter sidecar. The
        # public /metrics surface here is reserved for the local Prometheus
        # itself (`prometheus :9090/metrics`) — handy if Grafana Cloud also
        # wants to scrape via Cloudflare Tunnel later. Today it's a 404.
        proxy_pass http://127.0.0.1:9090/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
