site:
  name: Mambakkam
  site: 'https://mambakkam.net'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ~

metadata:
  title:
    default: Mambakkam — Village, Land, People
    template: '%s — Mambakkam'
  description: 'Mambakkam is a farming village in Kalavai Taluk, Ranipet District, Tamil Nadu — near the Palar River, known for rice, cotton, and sugarcane, and home to its temples, its land, and its people.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Mambakkam
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@mambakkam'
    site: '@mambakkam'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
