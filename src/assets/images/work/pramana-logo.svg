<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Pramana — proof seal">
  <defs>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10897a"/>
      <stop offset="1" stop-color="#2f7d3f"/>
    </linearGradient>
    <linearGradient id="sealDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b6256"/>
      <stop offset="1" stop-color="#256432"/>
    </linearGradient>
  </defs>
  <!-- scalloped notary seal -->
  <path d="M 100.00 16.00 A 20.32 20.32 0 0 1 132.15 22.39 A 20.32 20.32 0 0 1 159.40 40.60 A 20.32 20.32 0 0 1 177.61 67.85 A 20.32 20.32 0 0 1 184.00 100.00 A 20.32 20.32 0 0 1 177.61 132.15 A 20.32 20.32 0 0 1 159.40 159.40 A 20.32 20.32 0 0 1 132.15 177.61 A 20.32 20.32 0 0 1 100.00 184.00 A 20.32 20.32 0 0 1 67.85 177.61 A 20.32 20.32 0 0 1 40.60 159.40 A 20.32 20.32 0 0 1 22.39 132.15 A 20.32 20.32 0 0 1 16.00 100.00 A 20.32 20.32 0 0 1 22.39 67.85 A 20.32 20.32 0 0 1 40.60 40.60 A 20.32 20.32 0 0 1 67.85 22.39 A 20.32 20.32 0 0 1 100.00 16.00 Z" fill="url(#seal)"/>
  <!-- inner disk -->
  <circle cx="100" cy="100" r="66" fill="url(#sealDark)"/>
  <!-- double-ring detail -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"/>
  <!-- checkmark = proof -->
  <path d="M74 101 L92 119 L128 81" fill="none" stroke="#ffffff" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
